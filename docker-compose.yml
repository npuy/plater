version: '3.8'

services:
  # Backend - Express API
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: plater-server
    ports:
      - "22883:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Frontend - React + Nginx
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: plater-client
    ports:
      - "2288:80"
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  server-uploads:
    driver: local
